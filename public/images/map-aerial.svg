<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#DCEED1"/>
  <!-- Roads grid -->
  <rect x="0" y="200" width="1200" height="60" fill="#A5D6A7"/>
  <rect x="0" y="450" width="1200" height="80" fill="#A5D6A7"/>
  <rect x="0" y="700" width="1200" height="60" fill="#A5D6A7"/>
  <rect x="200" y="0" width="80" height="900" fill="#A5D6A7"/>
  <rect x="500" y="0" width="100" height="900" fill="#A5D6A7"/>
  <rect x="800" y="0" width="70" height="900" fill="#A5D6A7"/>
  <rect x="1050" y="0" width="150" height="900" fill="#A5D6A7"/>
  <!-- Blocks/buildings -->
  <rect x="280" y="20" width="200" height="160" fill="#B0BEC5"/>
  <rect x="280" y="270" width="200" height="160" fill="#B0BEC5"/>
  <rect x="280" y="530" width="200" height="150" fill="#B0BEC5"/>
  <rect x="600" y="20" width="180" height="200" fill="#B0BEC5"/>
  <rect x="870" y="20" width="160" height="200" fill="#B0BEC5"/>
  <rect x="600" y="280" width="180" height="150" fill="#B0BEC5"/>
  <rect x="870" y="280" width="160" height="150" fill="#B0BEC5"/>
  <rect x="600" y="550" width="180" height="130" fill="#B0BEC5"/>
  <rect x="870" y="550" width="160" height="130" fill="#B0BEC5"/>
  <!-- Green areas -->
  <rect x="600" y="750" width="180" height="130" fill="#81C784"/>
  <rect x="870" y="760" width="160" height="120" fill="#81C784"/>
  <!-- Markers for potholes -->
  <circle cx="500" cy="480" r="12" fill="#F44336"/>
  <circle cx="500" cy="480" r="8" fill="#FFCDD2"/>
  <circle cx="830" cy="260" r="12" fill="#F44336"/>
  <circle cx="830" cy="260" r="8" fill="#FFCDD2"/>
  <circle cx="1100" cy="500" r="12" fill="#F44336"/>
  <circle cx="1100" cy="500" r="8" fill="#FFCDD2"/>
  <circle cx="300" cy="720" r="12" fill="#F44336"/>
  <circle cx="300" cy="720" r="8" fill="#FFCDD2"/>
  <circle cx="650" cy="800" r="12" fill="#FF9800"/>
  <circle cx="650" cy="800" r="8" fill="#FFE0B2"/>
  <!-- Legend -->
  <rect x="20" y="20" width="200" height="80" fill="white" opacity="0.9" rx="5"/>
  <circle cx="45" cy="50" r="8" fill="#F44336"/><text x="60" y="55" font-family="sans-serif" font-size="12">Dangerous</text>
  <circle cx="45" cy="75" r="8" fill="#FF9800"/><text x="60" y="80" font-family="sans-serif" font-size="12">Warning</text>
</svg>