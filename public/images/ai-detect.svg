<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <rect width="1200" height="600" fill="#1E1E2E"/>
  <!-- Road surface photo placeholder -->
  <rect x="50" y="50" width="500" height="500" fill="#444"/>
  <rect x="70" y="70" width="460" height="460" fill="#555"/>
  <!-- Crack on road -->
  <path d="M150 100 Q250 200 200 300 Q150 400 300 480" stroke="#222" stroke-width="4" fill="none"/>
  <!-- Bounding box around damage -->
  <rect x="140" y="90" width="180" height="420" fill="none" stroke="#00E5FF" stroke-width="3"/>
  <text x="145" y="82" font-family="monospace" font-size="14" fill="#00E5FF">CRACK DETECTED 92%</text>

  <!-- Second road image -->
  <rect x="600" y="50" width="550" height="500" fill="#4A4A4A"/>
  <rect x="620" y="70" width="510" height="460" fill="#606060"/>
  <!-- Pothole -->
  <ellipse cx="850" cy="300" rx="60" ry="40" fill="#2D2D2D"/>
  <!-- Bounding box -->
  <rect x="780" y="250" width="140" height="100" fill="none" stroke="#00E5FF" stroke-width="3"/>
  <text x="785" y="242" font-family="monospace" font-size="14" fill="#00E5FF">POTHOLE 97%</text>

  <!-- Bottom info bar -->
  <rect x="0" y="565" width="1200" height="35" fill="#0D0D1A"/>
  <text x="20" y="588" font-family="monospace" font-size="14" fill="#00E676">● AI ACTIVE</text>
  <text x="200" y="588" font-family="monospace" font-size="14" fill="#CCC">2 objects detected</text>
  <text x="450" y="588" font-family="monospace" font-size="14" fill="#CCC">Model: road-damage-v3</text>
</svg>